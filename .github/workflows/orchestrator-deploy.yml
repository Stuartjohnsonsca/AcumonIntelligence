name: Deploy orchestrator

# Triggers when orchestrator/** changes land on main, or on manual dispatch.
# Builds the Docker image in ACR (no Docker daemon needed in CI) and rolls
# the Azure Container App to the new tag. Each push gets its own immutable
# :<sha> tag so rollback is just a re-run of az containerapp update with
# an earlier SHA.

on:
  push:
    branches: [main]
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-deploy.yml'
  workflow_dispatch:

env:
  AZURE_RG: Audit_Tools
  ACR_NAME: acracumon
  CONTAINER_APP: acumon-orchestrator
  IMAGE_NAME: acumon-orchestrator

concurrency:
  group: orchestrator-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "image=${ACR_NAME}.azurecr.io/${IMAGE_NAME}:$SHA" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${IMAGE_NAME}:${{ steps.tag.outputs.tag }}" \
            --image "${IMAGE_NAME}:latest" \
            --file orchestrator/Dockerfile \
            orchestrator

      - name: Roll Container App to new image
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$AZURE_RG" \
            --image "${{ steps.tag.outputs.image }}"

      - name: Wait for new revision to be healthy
        run: |
          for i in {1..30}; do
            STATE=$(az containerapp revision list \
              --name "$CONTAINER_APP" \
              --resource-group "$AZURE_RG" \
              --query "[?properties.active] | [0].properties.healthState" \
              -o tsv)
            echo "Active revision healthState: $STATE"
            if [ "$STATE" = "Healthy" ]; then exit 0; fi
            sleep 10
          done
          echo "Active revision did not reach Healthy within 5 minutes" >&2
          exit 1

      - name: Show active revision
        if: always()
        run: |
          az containerapp revision list \
            --name "$CONTAINER_APP" \
            --resource-group "$AZURE_RG" \
            --query "[?properties.active].{name:name, image:properties.template.containers[0].image, healthState:properties.healthState, created:properties.createdTime}" \
            -o table
