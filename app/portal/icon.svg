<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 25 40 40">
  <!-- Portal-specific favicon: three dark rounded squares arranged
       top-left, top-right, bottom-left — giving a "P"-ish silhouette
       so the client portal tab is visually distinguishable from the
       other Acumon apps (which use only the top-right + bottom-left
       pair). Bottom-right is intentionally left empty as the
       "counter" that makes the P-shape read. -->
